<!-- here we learn how to run vedio , audio and other media in web site -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vedio audio and media</title>
</head>
<body>
    <video src = "video.mp4" height = "255" controls poster = "sigma-playlist.png"></video> 
    <!--other attributes we can add in vedio : muted ,autoplay, loop -->

    <audio src = "paro.mpeg" controls ></audio>
    <!--other attributes we can add in a audio : autoplay,muted,loop,preload = "metadata/auto/none" -->
    
    <svg height = "100" width = "100">
        <circle cx = "50" cy = "50" r = "40" stroke = "black" stroke-width = "3" fill="blue" />
    </svg>

    <img src = "img.svg" alt = "my svg img" >

    <iframe src = "https://shivankart9.github.io/" width = "444" height = "444"></iframe> <!--to add website-->

    <!-- to add yt vedio click on share then click on embed then it will give you code just paste that code -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=xJgJMHKdc0T552vL&amp;start=749" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <!-- same to add yt playlist as vedio  -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/videoseries?si=bMIwvYhz_wkJc1TM&amp;start=749&amp;list=PLu0W_9lII9agq5TrH9XLIKQvv0iaF2X3w" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
