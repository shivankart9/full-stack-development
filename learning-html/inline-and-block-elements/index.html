<!-- inline elements take only width that is required but block elements takes the whole width -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline and block elements</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p>paragraph and block element</p> <!--block element-->
    <a href="https://shivankar-tiwari.netlify.app">portfolio site </a> <!--inline element-->
    <div>div tag and block element</div> <!--block element-->
    <span>span tag and inline element</span> <!--inline element-->
    <a href="https://leetcode.com">leetcode</a> <!--inline element-->
</body>


</html>
